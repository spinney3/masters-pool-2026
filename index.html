<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masters Pool — Update In Progress</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background-color: #1a4a2e;
      background-image:
        radial-gradient(ellipse at top, #2d6e48 0%, #1a4a2e 60%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* Animated grass blades at the bottom */
    .grass-strip {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 80px;
      overflow: hidden;
      pointer-events: none;
    }

    .grass-strip svg {
      width: 100%;
      height: 100%;
    }

    /* Card */
    .card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 56px 64px;
      max-width: 620px;
      width: 92%;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
      position: relative;
      z-index: 10;
    }

    /* Flag pin icon */
    .flag-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 28px;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
    }

    /* Gold ribbon label */
    .ribbon {
      display: inline-block;
      background: linear-gradient(135deg, #c9a84c, #f0d068, #c9a84c);
      color: #2a1a00;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 6px 20px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: #f0d068;
      line-height: 1.2;
      margin-bottom: 16px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    .subtitle {
      font-size: 1.05rem;
      color: rgba(255,255,255,0.75);
      font-weight: 300;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    /* Divider */
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #c9a84c, transparent);
      margin: 0 auto 36px;
    }

    /* Spinner / club swing animation */
    .loader {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 36px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f0d068;
      animation: bounce 1.4s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%            { transform: scale(1.1); opacity: 1; }
    }

    /* Status message */
    .status {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.45);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* Floating azalea petals */
    .petals { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
    .petal {
      position: absolute;
      width: 10px;
      height: 14px;
      border-radius: 50% 50% 50% 0;
      background: rgba(255, 182, 193, 0.5);
      animation: fall linear infinite;
      transform-origin: center;
    }

    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Floating petals -->
  <div class="petals" id="petals"></div>

  <!-- Main card -->
  <div class="card">
    <!-- Flag SVG -->
    <svg class="flag-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Pin -->
      <rect x="30" y="8" width="3" height="48" rx="1.5" fill="#c9a84c"/>
      <!-- Flag -->
      <polygon points="33,8 58,20 33,32" fill="#f0d068"/>
      <!-- Hole circle -->
      <ellipse cx="31.5" cy="56" rx="10" ry="3" fill="rgba(0,0,0,0.3)"/>
    </svg>

    <div class="ribbon">Augusta Masters Pool</div>
    <h1>Back on the Course<br/>Shortly</h1>

    <div class="divider"></div>

    <p class="subtitle">
      We're making improvements to your Masters Pool experience.<br/>
      We'll be back before the back nine — thanks for your patience.
    </p>

    <div class="loader">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <p class="status">Update in progress</p>
  </div>

  <!-- Grass strip -->
  <div class="grass-strip">
    <svg viewBox="0 0 1440 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,80 L0,50 Q10,20 20,50 Q30,80 40,45 Q50,10 60,45 Q70,80 80,40 Q90,5 100,42 Q110,78 120,38 Q130,2 140,38 Q150,75 160,35 Q170,0 180,35 Q190,72 200,32 Q210,0 220,35 Q230,70 240,30 Q250,0 260,30 Q270,65 280,28 Q290,0 300,28 Q310,60 320,25 Q330,0 340,28 Q350,58 360,22 Q370,0 380,25 Q390,55 400,20 Q410,0 420,23 Q430,50 440,18 Q450,0 460,22 Q470,48 480,16 Q490,0 500,20 Q510,45 520,15 Q530,0 540,20 Q550,45 560,14 Q570,0 580,18 Q590,42 600,12 Q610,0 620,18 Q630,40 640,10 Q650,0 660,16 Q670,38 680,10 Q690,0 700,15 Q710,36 720,8 Q730,0 740,14 Q750,34 760,8 Q770,0 780,14 Q790,34 800,8 Q810,0 820,14 Q830,35 840,10 Q850,0 860,14 Q870,35 880,12 Q890,0 900,16 Q910,38 920,14 Q930,0 940,18 Q950,40 960,16 Q970,0 980,18 Q990,42 1000,18 Q1010,0 1020,20 Q1030,45 1040,20 Q1050,0 1060,22 Q1070,48 1080,22 Q1090,0 1100,24 Q1110,52 1120,24 Q1130,0 1140,26 Q1150,55 1160,28 Q1170,4 1180,28 Q1190,58 1200,30 Q1210,5 1220,30 Q1230,60 1240,32 Q1250,8 1260,35 Q1270,65 1280,38 Q1290,14 1300,38 Q1310,68 1320,42 Q1330,18 1340,42 Q1350,72 1360,45 Q1370,22 1380,48 Q1390,75 1400,50 Q1410,28 1420,52 Q1430,78 1440,55 L1440,80 Z" fill="#0f3320"/>
      <path d="M0,80 L0,60 Q15,35 30,60 Q45,80 60,52 Q75,25 90,55 Q105,78 120,48 Q135,18 150,50 Q165,75 180,45 Q195,15 210,48 Q225,75 240,44 Q255,12 270,46 Q285,75 300,42 Q315,10 330,44 Q345,72 360,40 Q375,8 390,42 Q405,72 420,38 Q435,6 450,40 Q465,70 480,36 Q495,4 510,38 Q525,68 540,34 Q555,2 570,36 Q585,66 600,32 Q615,0 630,34 Q645,65 660,30 Q675,0 690,32 Q705,62 720,28 Q735,0 750,30 Q765,60 780,26 Q795,0 810,28 Q825,58 840,24 Q855,0 870,26 Q885,56 900,22 Q915,0 930,24 Q945,52 960,22 Q975,0 990,24 Q1005,55 1020,24 Q1035,0 1050,26 Q1065,58 1080,28 Q1095,2 1110,30 Q1125,62 1140,32 Q1155,5 1170,35 Q1185,65 1200,38 Q1215,12 1230,40 Q1245,70 1260,44 Q1275,18 1290,48 Q1305,75 1320,52 Q1335,28 1350,55 Q1365,80 1380,58 Q1395,38 1410,62 Q1425,80 1440,65 L1440,80 Z" fill="#1a4a2e"/>
    </svg>
  </div>

  <script>
    // Generate floating petals
    const petalContainer = document.getElementById('petals');
    for (let i = 0; i < 18; i++) {
      const petal = document.createElement('div');
      petal.className = 'petal';
      const hue = Math.random() > 0.5 ? 'rgba(255,182,193,0.45)' : 'rgba(255,220,180,0.35)';
      petal.style.cssText = `
        left: ${Math.random() * 100}vw;
        top: ${Math.random() * -20}vh;
        width: ${8 + Math.random() * 8}px;
        height: ${10 + Math.random() * 10}px;
        background: ${hue};
        animation-duration: ${6 + Math.random() * 10}s;
        animation-delay: ${Math.random() * 10}s;
        border-radius: ${Math.random() > 0.5 ? '50% 50% 50% 0' : '50% 0 50% 50%'};
      `;
      petalContainer.appendChild(petal);
    }
  </script>
</body>
</html>
